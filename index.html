<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barishal Courts Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#185FA5;--sb:192px;--bg:#f8f7f4;--surf:#fff;--bd:rgba(0,0,0,0.1);--tx:#1a1917;--tx2:#5a5856;--tx3:#8a8784;--r:8px;--rl:12px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}
body.bn{font-family:'Hind Siliguri',sans-serif}
.shell{display:flex;min-height:100vh}
.sb{width:var(--sb);flex-shrink:0;background:var(--surf);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-hd{padding:1rem 1rem .75rem;border-bottom:0.5px solid var(--bd)}
.sb-title{font-size:13px;font-weight:600;line-height:1.3}
.sb-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.sb-nav{padding:.4rem 0;flex:1}
.ng{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;padding:.6rem 1rem .2rem}
.ni{display:flex;align-items:center;gap:7px;padding:6px 1rem;font-size:12.5px;color:var(--tx2);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;font-family:inherit}
.ni:hover{background:var(--bg)}
.ni.on{background:var(--bg);color:var(--tx);border-left-color:var(--accent);font-weight:500}
.ni.sub{padding-left:2.2rem;font-size:12px}
.sb-ft{padding:.75rem 1rem;border-top:0.5px solid var(--bd)}
.lb{width:100%;padding:6px 10px;font-size:12px;font-family:inherit;border:0.5px solid rgba(0,0,0,0.18);border-radius:var(--r);background:none;cursor:pointer;color:var(--tx2)}
.lb:hover{background:var(--bg)}
.main{flex:1;min-width:0;padding:1.75rem 2rem;max-width:960px}
.pt{font-size:20px;font-weight:600;margin-bottom:.2rem}
.ps{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
.sl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin:1.4rem 0 .6rem}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:1.2rem}
.kc{background:var(--bg);border-radius:var(--r);padding:.8rem 1rem}
.kl{font-size:11px;color:var(--tx2);margin-bottom:3px}
.kv{font-size:21px;font-weight:600;line-height:1.1}
.ks{font-size:11px;color:var(--tx3);margin-top:2px}
.kc.red .kv{color:#A32D2D}.kc.amb .kv{color:#854F0B}.kc.grn .kv{color:#3B6D11}.kc.blu .kv{color:#185FA5}
.card{background:var(--surf);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem}
.cn{font-size:11px;color:var(--tx3);margin-top:.65rem;padding-top:.65rem;border-top:0.5px solid var(--bd)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 9px;font-size:11px;font-weight:600;color:var(--tx2);border-bottom:0.5px solid var(--bd);white-space:nowrap}
td{padding:7px 9px;border-bottom:0.5px solid var(--bd)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.n{text-align:right;font-variant-numeric:tabular-nums}
.b{display:inline-block;padding:2px 7px;border-radius:var(--r);font-size:11px;font-weight:500}
.br{background:#FCEBEB;color:#A32D2D}.ba{background:#FAEEDA;color:#854F0B}
.bg{background:#EAF3DE;color:#3B6D11}.bb{background:#E6F1FB;color:#185FA5}
.ab{border-left:3px solid #E24B4A;padding:.6rem .9rem;background:#FCEBEB;border-radius:0 var(--r) var(--r) 0;margin-bottom:.6rem}
.ab .ah{font-size:12px;font-weight:600;color:#A32D2D;margin-bottom:2px}.ab .at{font-size:12px;color:#A32D2D}
.wb{border-left:3px solid #EF9F27;padding:.6rem .9rem;background:#FAEEDA;border-radius:0 var(--r) var(--r) 0;margin-bottom:.6rem}
.wb .ah{font-size:12px;font-weight:600;color:#854F0B;margin-bottom:2px}.wb .at{font-size:12px;color:#854F0B}
.pb{border-left:3px solid #1D9E75;padding:.6rem .9rem;background:#E1F5EE;border-radius:0 var(--r) var(--r) 0;margin-bottom:.6rem}
.pb .ah{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:2px}.pb .at{font-size:12px;color:#0F6E56}
.ib{border-left:3px solid #185FA5;padding:.6rem .9rem;background:#E6F1FB;border-radius:0 var(--r) var(--r) 0;margin-bottom:.6rem}
.ib .ah{font-size:12px;font-weight:600;color:#185FA5;margin-bottom:2px}.ib .at{font-size:12px;color:#185FA5}
.pr{display:flex;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.pr:last-child{border-bottom:none}
.pl{flex:1;font-size:12.5px}
.pbw{width:90px;height:6px;background:var(--bg);border-radius:3px;margin:0 9px;flex-shrink:0}
.pf{height:100%;border-radius:3px}
.pv{font-size:12px;font-weight:500;min-width:44px;text-align:right;flex-shrink:0}
.lg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:9px;font-size:12px;color:var(--tx2)}
.li{display:flex;align-items:center;gap:4px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.cw{position:relative;width:100%}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1.2rem}
.tb{padding:4px 11px;font-size:12px;font-family:inherit;border:0.5px solid rgba(0,0,0,0.18);border-radius:var(--r);background:none;cursor:pointer;color:var(--tx2)}
.tb:hover{background:var(--bg)}
.tb.on{background:var(--surf);border-color:var(--accent);color:var(--accent);font-weight:500}
@media(max-width:720px){.sb{display:none}.main{padding:1rem}.two{grid-template-columns:1fr}.kg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-hd">
    <div class="sb-title">Barishal Courts Dashboard</div>
    <div class="sb-sub">Barishal District</div>
  </div>
  <div class="sb-nav">
    <button class="ni on" onclick="show('overview',this)">&#128202; Overview</button>
    <button class="ni" onclick="show('district',this)">&#127963; District view</button>
    <button class="ni" onclick="show('court',this)">&#9878; Court-by-court</button>
    <button class="ni" onclick="show('pending',this)">&#128336; Pending &amp; age</button>
    <button class="ni" onclick="show('monthly',this)">&#128197; Monthly progress</button>
    <button class="ni" onclick="show('casetypes',this)">&#127991; Case types</button>
    <div class="ng">NOS</div>
    <button class="ni" onclick="show('nos',this)">&#128203; NOS deep-dive</button>
    <button class="ni sub" onclick="show('nos_off',this)">&#9878; Offence types</button>
    <button class="ni sub" onclick="show('nos_bar',this)">&#128683; Barriers</button>
    <button class="ni sub" onclick="show('nos_cas',this)">&#9888; Notable cases</button>
    <button class="ni" onclick="show('method',this)">&#8505; Methodology</button>
  </div>
  <div class="sb-ft">
    <div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Last updated: 2026-06-06</div>
    <button class="lb" onclick="toggleLang()">&#127760; <span id="langBtn">&#2476;&#2494;&#2434;&#2482;&#2494;</span></button>
  </div>
</nav>
<main class="main" id="main"></main>
</div>
<script>

var DCL = ["CJM (Total)", "Human Trafficking Tribunal", "Nari o Shishu Tribunal", "Cyber Tribunal", "Metropolitan Sessions Court (All)", "CMM (Total)", "District & Session Judge (All)", "Jana Nirapotta & Special Session Judge", "Divisional Special Judge"];
var DCR = [0.7, 1.7, 2.2, 2.8, 3.2, 3.5, 4.0, 17.0, 48.8];
var DCC = ["#639922", "#639922", "#639922", "#639922", "#185FA5", "#185FA5", "#185FA5", "#EF9F27", "#E24B4A"];
var DBL = ["Human Trafficking Tribunal", "Jana Nirapotta & Special Session Judge", "Divisional Special Judge", "Cyber Tribunal", "District & Session Judge (All)", "Metropolitan Sessions Court (All)", "Nari o Shishu Tribunal", "CMM (Total)", "CJM (Total)"];
var DBT = [58, 112, 172, 422, 1881, 2536, 3564, 10356, 11478];
var DB5 = [1, 19, 84, 12, 75, 80, 77, 358, 79];
var ACL = ["NOS", "CMM", "ACJM", "ACMM", "CJM", "DJ", "JM2"];
var A5T = [31, 80, 6, 9, 6, 6, 2];
var AOT = [3, 7, 1, 0, 1, 0, 0];
var YRL = ["2000", "2007", "2008", "2010", "2011", "2014", "2015", "2016", "2017", "2018", "2019", "2025"];
var YRV = [1, 1, 1, 1, 2, 2, 4, 5, 22, 37, 76, 1];
var M5L = ["Nari", "Chief", "Additional", "Shishu"];
var M5B = [10, 31, 5, 0];
var M5D = [1, 9, 1, 2];
var M5P = [10, 29, 5, 0];
var TDS = [{"label": "Nari O Shishu Act", "data": [34, 0, 0, 0, 0, 0, 0], "backgroundColor": "#D4537E", "borderWidth": 0}, {"label": "Special Laws", "data": [0, 30, 0, 9, 0, 4, 0], "backgroundColor": "#EF9F27", "borderWidth": 0}, {"label": "Homicide / Attempt", "data": [0, 21, 6, 0, 3, 0, 2], "backgroundColor": "#E24B4A", "borderWidth": 0}, {"label": "Forgery / Fraud", "data": [0, 18, 0, 0, 4, 0, 0], "backgroundColor": "#D85A30", "borderWidth": 0}, {"label": "Theft / Robbery", "data": [0, 13, 0, 0, 0, 0, 0], "backgroundColor": "#1D9E75", "borderWidth": 0}, {"label": "Assault / Hurt", "data": [0, 2, 1, 0, 1, 0, 0], "backgroundColor": "#185FA5", "borderWidth": 0}, {"label": "Rioting / Unlawful Assembly", "data": [0, 1, 0, 0, 0, 0, 0], "backgroundColor": "#639922", "borderWidth": 0}, {"label": "Other / Unclassified", "data": [0, 2, 0, 0, 0, 2, 0], "backgroundColor": "#B4B2A9", "borderWidth": 0}, {"label": "Unclassified", "data": [0, 13, 93, 91, 92, 94, 98], "backgroundColor": "#D3D1C7", "borderWidth": 0}];
var OFL = ["Section 9", "Section 7", "Section 11", "Section 10", "Section 17"];
var OFV = [12, 9, 6, 2, 1];
var OFC = ["#E24B4A", "#D4537E", "#EF9F27", "#185FA5", "#888780"];
var NYR = [{"y": "2010", "n": 1}, {"y": "2014", "n": 1}, {"y": "2015", "n": 1}, {"y": "2016", "n": 1}, {"y": "2017", "n": 6}, {"y": "2018", "n": 13}, {"y": "2019", "n": 11}];

var lang = 'en';
function toggleLang() {
  lang = lang === 'en' ? 'bn' : 'en';
  document.body.className = lang === 'bn' ? 'bn' : '';
  document.getElementById('langBtn').innerHTML = lang === 'bn' ? 'English' : '&#2476;&#2494;&#2434;&#2482;&#2494;';
}
var charts = {};
function mkChart(id, cfg) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  var el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, cfg);
}
function show(p, btn) {
  document.querySelectorAll('.ni').forEach(function(n){ n.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  render(p);
}
function render(p) {
  var m = document.getElementById('main');
  if (p==='overview') rOverview(m);
  else if (p==='district') rDistrict(m);
  else if (p==='pending') rPending(m);
  else if (p==='monthly') rMonthly(m);
  else if (p==='casetypes') rCaseTypes(m);
  else if (p==='nos') rNOS(m);
  else if (p==='nos_off') rNOSOff(m);
  else if (p==='nos_bar') rNOSBar(m);
  else if (p==='nos_cas') rNOSCas(m);
  else if (p==='court') rCourt(m);
  else if (p==='method') rMethod(m);
}

function rOverview(m) {
  m.innerHTML = '<div class="pt">Overview</div>'
    + '<div class="ps">Barishal District &mdash; criminal case backlog summary, September 2025</div>'
    + '<div class="kg">'
    + '<div class="kc red"><div class="kl">Total pending cases</div><div class="kv">30,579</div><div class="ks">District-wide, Sep 2025</div></div>'
    + '<div class="kc amb"><div class="kl">Pending 5+ years</div><div class="kv">785</div><div class="ks">2.6% of total</div></div>'
    + '<div class="kc"><div class="kl">Courts covered</div><div class="kv">10</div><div class="ks">All court types</div></div>'
    + '<div class="kc red"><div class="kl">Highest 5+ yr rate</div><div class="kv">48.8%</div><div class="ks">Div. Special Judge</div></div>'
    + '<div class="kc red"><div class="kl">Old case register</div><div class="kv">130</div><div class="ks">NOS &middot; 35 reviewed</div></div>'
    + '<div class="kc grn"><div class="kl">Disposed Feb 2026</div><div class="kv">84</div><div class="ks">NOS + CMM + ACMM</div></div>'
    + '</div>'
    + '<div class="sl">5+ year backlog rate by court &mdash; Sep 2025</div>'
    + '<div class="card"><div class="lg"><span class="li"><span class="ld" style="background:#639922"></span>&lt;3%</span><span class="li"><span class="ld" style="background:#185FA5"></span>3&ndash;10%</span><span class="li"><span class="ld" style="background:#EF9F27"></span>10&ndash;20%</span><span class="li"><span class="ld" style="background:#E24B4A"></span>20%+</span></div>'
    + '<div class="cw" style="height:250px"><canvas id="ovC"></canvas></div>'
    + '<div class="cn">Source: Sep 2025 Pending Cases Report</div></div>'
    + '<div class="sl">Key findings</div>'
    + '<div class="card"><div class="pr"><span class="pl">Divisional Special Judge</span><div class="pbw"><div class="pf" style="width:97.6%;background:#E24B4A"></div></div><span class="pv"><span class="b br">48.8%</span></span></div><div class="pr"><span class="pl">Jana Nirapotta & Special Session Judge</span><div class="pbw"><div class="pf" style="width:34.0%;background:#EF9F27"></div></div><span class="pv"><span class="b ba">17.0%</span></span></div><div class="pr"><span class="pl">District & Session Judge (All)</span><div class="pbw"><div class="pf" style="width:8.0%;background:#185FA5"></div></div><span class="pv"><span class="b bb">4.0%</span></span></div><div class="pr"><span class="pl">CMM (Total)</span><div class="pbw"><div class="pf" style="width:7.0%;background:#185FA5"></div></div><span class="pv"><span class="b bb">3.5%</span></span></div><div class="pr"><span class="pl">Metropolitan Sessions Court (All)</span><div class="pbw"><div class="pf" style="width:6.4%;background:#185FA5"></div></div><span class="pv"><span class="b bb">3.2%</span></span></div><div class="pr"><span class="pl">Cyber Tribunal</span><div class="pbw"><div class="pf" style="width:5.6%;background:#639922"></div></div><span class="pv"><span class="b bg">2.8%</span></span></div><div class="pr"><span class="pl">Nari o Shishu Tribunal</span><div class="pbw"><div class="pf" style="width:4.4%;background:#639922"></div></div><span class="pv"><span class="b bg">2.2%</span></span></div><div class="pr"><span class="pl">Human Trafficking Tribunal</span><div class="pbw"><div class="pf" style="width:3.4%;background:#639922"></div></div><span class="pv"><span class="b bg">1.7%</span></span></div><div class="pr"><span class="pl">CJM (Total)</span><div class="pbw"><div class="pf" style="width:1.4%;background:#639922"></div></div><span class="pv"><span class="b bg">0.7%</span></span></div><div class="pr"><span class="pl">Anti-Terrorism</span><div class="pbw"><div class="pf" style="width:0.0%;background:#639922"></div></div><span class="pv"><span class="b bg">0.0%</span></span></div></div>';
  setTimeout(function() {
    mkChart('ovC',{type:'bar',data:{labels:DCL,datasets:[{label:'5+ yr %',data:DCR,backgroundColor:DCC,borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw+'%';}}}},scales:{y:{ticks:{callback:function(v){return v+'%';}},grid:{color:'rgba(0,0,0,.05)'},beginAtZero:true},x:{ticks:{maxRotation:35,font:{size:10}},grid:{display:false}}}}});
  }, 50);
}

function rDistrict(m) {
  m.innerHTML = '<div class="pt">District view</div>'
    + '<div class="ps">All courts &mdash; total pending and 5+ year cases, September 2025</div>'
    + '<div class="card"><table><thead><tr><th>#</th><th>Court</th><th class="n">Total pending</th><th class="n">5+ years</th><th class="n">Rate</th></tr></thead><tbody><tr><td>1</td><td>District & Session Judge (All)</td><td class="n">1,881</td><td class="n">75</td><td class="n"><span class="b bb">4.0%</span></td></tr><tr><td>2</td><td>CJM (Total)</td><td class="n">11,478</td><td class="n">79</td><td class="n"><span class="b bg">0.7%</span></td></tr><tr><td>3</td><td>CMM (Total)</td><td class="n">10,356</td><td class="n">358</td><td class="n"><span class="b bb">3.5%</span></td></tr><tr><td>4</td><td>Nari o Shishu Tribunal</td><td class="n">3,564</td><td class="n">77</td><td class="n"><span class="b bg">2.2%</span></td></tr><tr><td>5</td><td>Human Trafficking Tribunal</td><td class="n">58</td><td class="n">1</td><td class="n"><span class="b bg">1.7%</span></td></tr><tr><td>6</td><td>Jana Nirapotta & Special Session Judge</td><td class="n">112</td><td class="n">19</td><td class="n"><span class="b ba">17.0%</span></td></tr><tr><td>7</td><td>Metropolitan Sessions Court (All)</td><td class="n">2,536</td><td class="n">80</td><td class="n"><span class="b bb">3.2%</span></td></tr><tr><td>8</td><td>Cyber Tribunal</td><td class="n">422</td><td class="n">12</td><td class="n"><span class="b bg">2.8%</span></td></tr><tr><td>9</td><td>Anti-Terrorism</td><td class="n">0</td><td class="n">0</td><td class="n"><span class="b bg">0.0%</span></td></tr><tr><td>10</td><td>Divisional Special Judge</td><td class="n">172</td><td class="n">84</td><td class="n"><span class="b br">48.8%</span></td></tr><tr style="font-weight:600"><td></td><td>Total</td><td class="n">30,579</td><td class="n">785</td><td class="n"><span class="b ba">2.6%</span></td></tr></tbody></table><div class="cn">Source: Sep 2025 Pending Cases Report</div></div>'
    + '<div class="sl">Total pending by court</div>'
    + '<div class="card"><div class="lg"><span class="li"><span class="ld" style="background:#185FA5"></span>Total</span><span class="li"><span class="ld" style="background:#E24B4A"></span>5+ yrs</span></div><div class="cw" style="height:320px"><canvas id="distC"></canvas></div></div>';
  setTimeout(function() {
    mkChart('distC',{type:'bar',data:{labels:DBL,datasets:[{label:'Total',data:DBT,backgroundColor:'#185FA5',borderWidth:0,borderRadius:2},{label:'5+ yrs',data:DB5,backgroundColor:'#E24B4A',borderWidth:0,borderRadius:2}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{grid:{color:'rgba(0,0,0,.05)'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
  }, 50);
}

function rPending(m) {
  m.innerHTML = '<div class="pt">Pending cases &amp; age analysis</div>'
    + '<div class="ps">Old case register &mdash; 634 cases filed 2019 or earlier, all pending as at Jan 2026</div>'
    + '<div class="kg"><div class="kc red"><div class="kl">Total old cases</div><div class="kv">634</div><div class="ks">7 courts</div></div><div class="kc amb"><div class="kl">Avg age</div><div class="kv">7.5 yrs</div><div class="ks">As at Jan 2026</div></div><div class="kc red"><div class="kl">100% over 5 yrs</div><div class="kv">634</div><div class="ks">Every case</div></div><div class="kc red"><div class="kl">Oldest case</div><div class="kv">25.5 yrs</div><div class="ks">CMM court</div></div></div>'
    + '<div class="two"><div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:.5rem">Age bands by court</div><div class="lg"><span class="li"><span class="ld" style="background:#185FA5"></span>5&ndash;10 yrs</span><span class="li"><span class="ld" style="background:#E24B4A"></span>Over 10</span></div><div class="cw" style="height:210px"><canvas id="ageC"></canvas></div></div>'

    + '<div class="tabs" id="cTabs">'+courts.map(function(c){return '<button class="tb'+(c.code===active?' on':'')+'" onclick="sC(''+c.code+'')">'+c.code+'</button>';}).join('')+'</div>'
    + '<div id="cPanel">'+panel(courts.find(function(c){return c.code===active;}))+'</div>';
  window.sC = function(code) {
    active = code;
    document.querySelectorAll('#cTabs .tb').forEach(function(b){b.classList.toggle('on',b.textContent.trim()===code);});
    document.getElementById('cPanel').innerHTML = panel(courts.find(function(c){return c.code===code;}));
  };
}
